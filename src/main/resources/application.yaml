spring:
  application:
    name: papergenerator

  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: school_ai_db
    # Added Redis Configuration for Upstash
    redis:
      url: ${UPSTASH_REDIS_URL}
      ssl:
        enabled: true

  ai:
    ollama:
      # Disabled auto-connection since Render won't talk to Ollama directly
      enabled: false
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.1:8b
      embedding:
        options:
          model: nomic-embed-text

    vectorstore:
      pinecone:
        apiKey: ${PINECONE_API_KEY}
        index-name: "school-notes"
        project-id: "r3jj6iu"
        environment: "aped-4627-b74a"
        namespace: "default"

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB