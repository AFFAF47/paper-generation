<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI Exam Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .exam-output {
            background: #f8f9fa;
            border-left: 5px solid #0d6efd;
            white-space: pre-wrap; /* Keeps the AI's formatting/newlines */
            padding: 20px;
        }
    </style>
</head>
<body class="container py-5">
<h2 class="mb-4">School Exam Generator <small class="text-muted">Powered by Llama 3.1</small></h2>

<div class="card p-4 shadow-sm mb-5">
    <form th:action="@{/exams/generate}" method="post">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" class="form-control" placeholder="e.g. Physics" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Class</label>
                <input type="text" name="className" class="form-control" placeholder="e.g. 10" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Chapter</label>
                <input type="text" name="chapter" class="form-control" placeholder="e.g. Light Reflection" required>
            </div>
            <div class="col-12">
                <label class="form-label">Question Pattern</label>
                <textarea name="pattern" class="form-control" rows="2" placeholder="e.g. 10 MCQs and 2 Long Answers"></textarea>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary w-100">Generate Exam Paper</button>
            </div>
        </div>
    </form>
</div>

<div th:if="${examPaper}" class="mt-4">
    <h3>Generated Paper: <span th:text="${subject}"></span> - <span th:text="${chapter}"></span></h3>
    <div class="exam-output mt-3" th:text="${examPaper}"></div>
    <button class="btn btn-success mt-3" onclick="window.print()">Print Paper</button>
</div>

</body>
</html>
