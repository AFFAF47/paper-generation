<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI Exam Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card { border: none; border-radius: 12px; }
        .exam-output {
            background: #ffffff;
            border-left: 5px solid #0d6efd;
            white-space: pre-wrap;
            padding: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
            border-radius: 0 8px 8px 0;
        }
        #loadingSection {
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
        }
        @media print {
            .btn, .card, h2, label, .text-muted { display: none !important; }
            .exam-output { border: none; padding: 0; box-shadow: none; }
            body { background: white; }
        }
    </style>
</head>
<body class="container py-5">

<div class="text-center mb-5">
    <h2 class="fw-bold">School Exam Generator</h2>
    <p class="text-muted">Generating papers from your personal subject silos using <strong>Llama 3.1</strong></p>

    <div class="d-flex justify-content-end mb-3">
        <a href="/exams/history-view" class="btn btn-outline-secondary shadow-sm">
            <i class="bi bi-clock-history"></i> View Generated History
        </a>
    </div>
</div>

<div class="card p-4 shadow-sm mb-5">
    <form id="examForm" th:action="@{/exams/generate}" method="post">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-semibold">Subject</label>
                <input type="text" name="subject" class="form-control" placeholder="e.g. Physics" required>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-semibold">Class</label>
                <input type="text" name="className" class="form-control" placeholder="e.g. 10" required>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-semibold">Chapter</label>
                <input type="text" name="chapter" class="form-control" placeholder="e.g. Light Reflection" required>
            </div>
            <div class="col-12">
                <label class="form-label fw-semibold">Question Pattern</label>
                <textarea name="pattern" class="form-control" rows="2"
                          placeholder="e.g. 10 MCQs (1 mark each) and 2 Long Answers (5 marks each)" required></textarea>
            </div>

            <div class="col-12 text-center">
                <button type="submit" id="submitBtn" class="btn btn-primary btn-lg w-100 mt-2">
                    Generate Exam Paper
                </button>

                <div id="loadingSection" class="d-none mt-3">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <h5 class="text-primary mt-3">Llama 3.1 is analyzing your notes...</h5>
                    <p class="text-muted small">This may take 10-20 seconds depending on your PC's hardware.</p>
                </div>
            </div>
        </div>
    </form>
</div>

<div th:if="${examPaper}" class="mt-4 fade-in">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Generated Paper: <span class="text-primary" th:text="${subject}"></span> (Class <span th:text="${className}"></span>)</h3>
        <button class="btn btn-outline-success" onclick="window.print()">
            <i class="bi bi-printer"></i> Print / Save as PDF
        </button>
    </div>
    <div class="exam-output shadow-sm" th:text="${examPaper}"></div>
</div>

<script>
    document.getElementById('examForm').addEventListener('submit', function() {
        // Hide the button and the previous result if it exists
        document.getElementById('submitBtn').classList.add('d-none');

        // Show the spinner
        const loading = document.getElementById('loadingSection');
        loading.classList.remove('d-none');
        loading.classList.add('animate-pulse');
    });
</script>
</body>
</html>
