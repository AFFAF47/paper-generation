<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Upload Subject Notes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; }
    .upload-card { border: none; border-radius: 15px; }
    .drop-zone {
      border: 2px dashed #0d6efd;
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      background: #f8f9fa;
      transition: 0.3s;
      cursor: pointer;
    }
    .drop-zone:hover { background: #e9ecef; }
    .nav-link {
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .nav-link:hover {
      color: #ffca2c !important; /* Gold hover effect */
    }
  </style>
</head>
<body class="container py-5">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="/exams">
      <i class="bi bi-cpu-fill me-2"></i> AI Exam Portal
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item px-2">
          <a class="nav-link active" href="/exams">
            <i class="bi bi-file-earmark-plus"></i> Generate
          </a>
        </li>
        <li class="nav-item px-2">
          <a class="nav-link" href="/exams/upload">
            <i class="bi bi-cloud-upload"></i> Upload
          </a>
        </li>
        <li class="nav-item px-2">
          <a class="nav-link" href="/exams/history-view">
            <i class="bi bi-clock-history"></i> History
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>📚 Knowledge Base Manager</h2>
  <a href="/exams" class="btn btn-outline-primary">Back to Generator</a>
</div>

<div class="card upload-card shadow-sm p-4">
  <form id="uploadForm" th:action="@{/api/ingest/upload}" method="post" enctype="multipart/form-data">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label fw-bold">Subject</label>
        <input type="text" name="subject" class="form-control" placeholder="e.g., Physics" required>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-bold">Class / Grade</label>
        <input type="text" name="className" class="form-control" placeholder="e.g., 10" required>
      </div>
      <div class="col-12">
        <label class="form-label fw-bold">Chapter / Unit Name</label>
        <input type="text" name="chapter" class="form-control" placeholder="e.g., Light Reflection" required>
      </div>

      <div class="col-12 mt-4">
        <div class="drop-zone" id="dropZone">
          <i class="bi bi-cloud-arrow-up fs-1 text-primary"></i>
          <p class="mt-2">Drag & Drop PDF Textbook or <span class="text-primary">Browse Files</span></p>
          <input type="file" name="file" id="fileInput" class="d-none" accept=".pdf" required>
          <div id="fileNameDisplay" class="text-success fw-bold mt-2"></div>
        </div>
      </div>

      <div class="col-12 mt-4">
        <button type="submit" id="uploadBtn" class="btn btn-primary w-100 btn-lg">
          Process & Sync to AI Brain
        </button>

        <div id="progressSection" class="d-none mt-3">
          <div class="progress">
            <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%"></div>
          </div>
          <p class="text-center text-muted mt-2">Splitting PDF and generating vectors on Windows PC...</p>
        </div>
      </div>
    </div>
  </form>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileNameDisplay = document.getElementById('fileNameDisplay');
  const uploadForm = document.getElementById('uploadForm');

  dropZone.onclick = () => fileInput.click();

  fileInput.onchange = (e) => {
    if (e.target.files.length > 0) {
      fileNameDisplay.innerText = "Selected: " + e.target.files[0].name;
    }
  };

  uploadForm.onsubmit = () => {
    document.getElementById('uploadBtn').classList.add('d-none');
    document.getElementById('progressSection').classList.remove('d-none');
  };
</script>
</body>
</html>
