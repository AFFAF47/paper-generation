<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .search-card { max-width: 500px; margin: 100px auto; border: none; border-radius: 15px; }
    </style>
</head>
<body class="container">
<div class="card search-card shadow-lg p-4">
    <h3 class="text-center mb-4">View Exam History</h3>
    <form th:action="@{/exams/history/results}" method="get">
        <div class="mb-3">
            <label class="form-label">Subject</label>
            <input type="text" name="subject" class="form-control" placeholder="e.g. Physics" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Class</label>
            <input type="text" name="className" class="form-control" placeholder="e.g. 10" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Fetch History from Atlas</button>
        <div class="text-center mt-3">
            <a href="/exams" class="text-decoration-none small">← Back to Generator</a>
        </div>
    </form>
</div>
</body>
</html>
